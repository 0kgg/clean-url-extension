<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Clean URL Copier</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
      font-size: 13px;
      width: 340px;
      margin: 0;
      padding: 12px;
      color: #1f2937;
    }
    label {
      display: block;
      font-weight: 600;
      margin-top: 8px;
      margin-bottom: 2px;
      font-size: 11px;
      color: #4b5563;
    }
    input, textarea {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
    }
    textarea { resize: vertical; min-height: 48px; }
    .row { display: flex; gap: 8px; }
    .row > div { flex: 1; }
    .label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
      margin-bottom: 2px;
    }
    .label-row label { margin: 0; }
    button.primary {
      width: 100%;
      margin-top: 12px;
      padding: 9px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button.primary:hover { background: #1d4ed8; }
    button.primary:active { background: #1e40af; }
    button.mini {
      padding: 2px 10px;
      background: #f3f4f6;
      color: #374151;
      border: 1px solid #d1d5db;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
    }
    button.mini:hover { background: #e5e7eb; }
    button.mini:active { background: #d1d5db; }
    input.mini-input {
      width: 44px;
      padding: 1px 4px;
      font-size: 11px;
      text-align: center;
    }
    .label-group { display: flex; align-items: center; gap: 6px; }
    .button-group { display: flex; gap: 4px; }
    .badge {
      font-size: 10px;
      font-weight: 500;
      color: #0369a1;
      background: #e0f2fe;
      padding: 1px 6px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      line-height: 1.4;
    }
    .badge[hidden] { display: none; }
    button.link-btn {
      background: none;
      border: none;
      color: #0369a1;
      font-size: 10px;
      padding: 0;
      margin: 0;
      cursor: pointer;
      text-decoration: underline;
      width: auto;
      font-weight: 500;
    }
    button.link-btn:hover { color: #075985; }
    .status {
      margin-top: 8px;
      font-size: 12px;
      text-align: center;
      min-height: 16px;
      color: #16a34a;
    }
    .status.error { color: #dc2626; }
  </style>
</head>
<body>
  <div class="label-row">
    <div class="label-group">
      <label for="title">商品名</label>
      <span id="saved-badge" class="badge" hidden>
        保存済
        <button type="button" id="revert-btn" class="link-btn">戻す</button>
      </span>
    </div>
    <div class="button-group">
      <button type="button" id="model-btn" class="mini">型番</button>
      <input type="number" id="token-count" class="mini-input"
             min="1" max="20" value="5"
             title="短縮時の最大トークン数（ブランド除く）">
      <button type="button" id="shorten-btn" class="mini">短縮</button>
    </div>
  </div>
  <textarea id="title" rows="2"></textarea>

  <div class="row">
    <div>
      <label for="color">色</label>
      <input id="color" type="text">
    </div>
    <div>
      <label for="size">サイズ</label>
      <input id="size" type="text">
    </div>
  </div>

  <div class="row">
    <div>
      <label for="price">単価</label>
      <input id="price" type="text" placeholder="￥0">
    </div>
    <div>
      <label for="quantity">個数</label>
      <input id="quantity" type="number" min="1" value="1">
    </div>
  </div>

  <label for="url">URL</label>
  <input id="url" type="text">

  <button id="copy-btn" class="primary">コピー</button>
  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
