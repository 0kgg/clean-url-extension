<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Clean URL Copier</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
      font-size: 13px;
      width: 340px;
      margin: 0;
      padding: 12px;
      color: #1f2937;
    }
    label {
      display: block;
      font-weight: 600;
      margin-top: 8px;
      margin-bottom: 2px;
      font-size: 11px;
      color: #4b5563;
    }
    input, textarea {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
    }
    textarea { resize: vertical; min-height: 48px; }
    .row { display: flex; gap: 8px; }
    .row > div { flex: 1; }
    button {
      width: 100%;
      margin-top: 12px;
      padding: 9px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    button:active { background: #1e40af; }
    .status {
      margin-top: 8px;
      font-size: 12px;
      text-align: center;
      min-height: 16px;
      color: #16a34a;
    }
    .status.error { color: #dc2626; }
  </style>
</head>
<body>
  <label for="title">商品名</label>
  <textarea id="title" rows="2"></textarea>

  <div class="row">
    <div>
      <label for="color">色</label>
      <input id="color" type="text">
    </div>
    <div>
      <label for="size">サイズ</label>
      <input id="size" type="text">
    </div>
  </div>

  <div class="row">
    <div>
      <label for="price">単価</label>
      <input id="price" type="text" placeholder="￥0">
    </div>
    <div>
      <label for="quantity">個数</label>
      <input id="quantity" type="number" min="1" value="1">
    </div>
  </div>

  <label for="url">URL</label>
  <input id="url" type="text">

  <button id="copy-btn">コピー</button>
  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
